version: '3.8'

services:
  mysql-app:
    image: mysql:8.0
    container_name: watermelon_mysql_app
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-watermelon_db}
      MYSQL_USER: ${MYSQL_USER:-watermelon_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-watermelon_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    volumes:
      - mysql_app_data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  keycloak-db:
    image: postgres:15
    container_name: watermelon_keycloak_db
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_password}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak}"]
      interval: 10s
      timeout: 5s
      retries: 3

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:24.0.1}
    container_name: watermelon_keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak_password}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HOSTNAME_URL: ${KEYCLOAK_PUBLIC_URL:-http://127.0.0.1:8080}
      KC_HOSTNAME_ADMIN_URL: ${KEYCLOAK_PUBLIC_URL:-http://127.0.0.1:8080}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./infra/keycloak_import:/opt/keycloak/data/import:ro
      - ./infra/keycloak_theme:/opt/keycloak/themes:ro
    command: start-dev --import-realm --http-host=0.0.0.0
    depends_on:
      keycloak-db:
        condition: service_healthy

volumes:
  mysql_app_data:
  keycloak_db_data: