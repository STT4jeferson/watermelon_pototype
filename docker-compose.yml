version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_offline_first
    network_mode: "host"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: watermelon_db
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
